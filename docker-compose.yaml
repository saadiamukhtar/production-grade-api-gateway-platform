version: "3.8"

services:

  redis:
    image: redis:7
    container_name: gateflow-redis
    ports:
      - "6379:6379"
    restart: always

  gateway:
    build: .
    container_name: gateflow-gateway
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    restart: always